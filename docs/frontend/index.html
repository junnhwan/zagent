<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAgent · 智能体指挥中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Source+Code+Pro:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- Marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   CSS VARIABLES & RESET
   ═══════════════════════════════════════════ */
:root {
  --void: #060a13;
  --abyss: #0a0e17;
  --panel: #0f1520;
  --panel-hover: #151d2e;
  --panel-border: #1a2438;
  --surface: #111827;
  --surface-alt: #1e293b;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #475569;
  --cyan: #00f0ff;
  --cyan-dim: #00a8b3;
  --cyan-glow: rgba(0, 240, 255, 0.15);
  --cyan-glow-strong: rgba(0, 240, 255, 0.35);
  --amber: #ff9f1c;
  --amber-dim: #b36e0d;
  --amber-glow: rgba(255, 159, 28, 0.15);
  --red: #ff4757;
  --red-glow: rgba(255, 71, 87, 0.15);
  --green: #2ed573;
  --green-glow: rgba(46, 213, 115, 0.15);
  --font-display: 'Orbitron', sans-serif;
  --font-body: 'Noto Sans SC', 'Source Code Pro', monospace;
  --font-mono: 'Source Code Pro', monospace;
  --radius: 8px;
  --radius-lg: 12px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--void);
  color: var(--text-primary);
  overflow: hidden;
  font-size: 14px;
}

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--cyan-dim); }

/* ═══════════════════════════════════════════
   BACKGROUND GRID & EFFECTS
   ═══════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(0, 240, 255, 0.04) 1px, transparent 0);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(0, 240, 255, 0.03) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(255, 159, 28, 0.02) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
#app {
  display: flex;
  height: 100vh;
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════ */
.sidebar {
  width: 72px;
  background: var(--abyss);
  border-right: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
  gap: 8px;
  flex-shrink: 0;
  position: relative;
}
.sidebar::after {
  content: '';
  position: absolute;
  top: 0;
  right: -1px;
  width: 1px;
  height: 100%;
  background: linear-gradient(to bottom, var(--cyan-dim), transparent 30%, transparent 70%, var(--amber-dim));
  opacity: 0.4;
}

.logo {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 11px;
  color: var(--cyan);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 24px;
  writing-mode: vertical-lr;
  text-orientation: mixed;
  text-shadow: 0 0 20px var(--cyan-glow-strong);
  cursor: default;
}

.nav-btn {
  width: 48px;
  height: 48px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  position: relative;
  font-size: 20px;
}
.nav-btn:hover {
  color: var(--text-secondary);
  background: var(--panel);
  border-color: var(--panel-border);
}
.nav-btn.active {
  color: var(--cyan);
  background: var(--cyan-glow);
  border-color: rgba(0, 240, 255, 0.2);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05);
}
.nav-btn.active::before {
  content: '';
  position: absolute;
  left: -12px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 24px;
  background: var(--cyan);
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 10px var(--cyan);
}
.nav-btn svg { width: 22px; height: 22px; }

.sidebar-bottom {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.status-label {
  font-size: 9px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  writing-mode: vertical-lr;
  letter-spacing: 1px;
}

/* ═══════════════════════════════════════════
   MAIN CONTENT AREA
   ═══════════════════════════════════════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Header */
.header {
  height: 56px;
  background: var(--abyss);
  border-bottom: 1px solid var(--panel-border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  flex-shrink: 0;
}
.header-title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-primary);
}
.header-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

/* ═══════════════════════════════════════════
   PANELS (Chat / Agent / RAG)
   ═══════════════════════════════════════════ */
.panel {
  flex: 1;
  display: none;
  flex-direction: column;
  min-height: 0;
}
.panel.active {
  display: flex;
}

/* ═══════════════════════════════════════════
   CONFIG BAR (top bar in each panel)
   ═══════════════════════════════════════════ */
.config-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--panel-border);
  flex-wrap: wrap;
}
.config-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.config-label {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  white-space: nowrap;
}

input[type="text"], input[type="number"], select {
  background: var(--surface);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 7px 12px;
  outline: none;
  transition: var(--transition);
  min-width: 0;
}
input[type="text"]:focus, input[type="number"]:focus, select:focus {
  border-color: var(--cyan-dim);
  box-shadow: 0 0 0 2px var(--cyan-glow);
}
select {
  cursor: pointer;
  padding-right: 28px;
}
input[type="number"] { width: 70px; }

/* Toggle switch */
.toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.toggle-track {
  width: 36px;
  height: 20px;
  background: var(--surface-alt);
  border-radius: 10px;
  position: relative;
  transition: var(--transition);
  border: 1px solid var(--panel-border);
}
.toggle.on .toggle-track {
  background: var(--cyan-glow);
  border-color: var(--cyan-dim);
}
.toggle-knob {
  width: 14px;
  height: 14px;
  background: var(--text-muted);
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: var(--transition);
}
.toggle.on .toggle-knob {
  transform: translateX(16px);
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
}

/* ═══════════════════════════════════════════
   MESSAGE AREA
   ═══════════════════════════════════════════ */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.msg {
  max-width: 80%;
  animation: msg-in 0.3s ease-out;
}
@keyframes msg-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user {
  align-self: flex-end;
}
.msg.assistant {
  align-self: flex-start;
}

.msg-bubble {
  padding: 12px 16px;
  border-radius: var(--radius-lg);
  font-size: 14px;
  line-height: 1.7;
  word-break: break-word;
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, rgba(0, 240, 255, 0.12), rgba(0, 240, 255, 0.06));
  border: 1px solid rgba(0, 240, 255, 0.15);
  border-bottom-right-radius: 4px;
  color: var(--text-primary);
}
.msg.assistant .msg-bubble {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-bottom-left-radius: 4px;
  color: var(--text-primary);
}
.msg-sender {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}
.msg.user .msg-sender { text-align: right; }

/* markdown inside messages */
.msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 8px 0 4px; color: var(--cyan); font-family: var(--font-body); }
.msg-bubble h1 { font-size: 18px; }
.msg-bubble h2 { font-size: 16px; }
.msg-bubble h3 { font-size: 14px; }
.msg-bubble p { margin: 4px 0; }
.msg-bubble code {
  background: var(--surface);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--amber);
}
.msg-bubble pre {
  background: var(--surface);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  padding: 12px;
  overflow-x: auto;
  margin: 8px 0;
}
.msg-bubble pre code {
  background: none;
  padding: 0;
  color: var(--text-primary);
}
.msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 4px 0; }
.msg-bubble blockquote {
  border-left: 3px solid var(--cyan-dim);
  padding-left: 12px;
  color: var(--text-secondary);
  margin: 8px 0;
}
.msg-bubble a { color: var(--cyan); text-decoration: none; }
.msg-bubble a:hover { text-decoration: underline; }
.msg-bubble table { border-collapse: collapse; margin: 8px 0; width: 100%; }
.msg-bubble th, .msg-bubble td { border: 1px solid var(--panel-border); padding: 6px 10px; text-align: left; font-size: 13px; }
.msg-bubble th { background: var(--surface); color: var(--cyan); }

/* ═══════════════════════════════════════════
   AGENT TIMELINE
   ═══════════════════════════════════════════ */
.agent-timeline {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.stage-node {
  display: flex;
  gap: 16px;
  animation: msg-in 0.3s ease-out;
  position: relative;
}
.stage-rail {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 32px;
  flex-shrink: 0;
}
.stage-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid var(--panel-border);
  background: var(--panel);
  z-index: 1;
  transition: var(--transition);
  flex-shrink: 0;
}
.stage-dot.active {
  border-color: var(--cyan);
  background: var(--cyan-glow);
  box-shadow: 0 0 12px var(--cyan-glow-strong);
  animation: dot-pulse 1.5s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%, 100% { box-shadow: 0 0 12px var(--cyan-glow-strong); }
  50% { box-shadow: 0 0 24px var(--cyan-glow-strong), 0 0 40px var(--cyan-glow); }
}
.stage-dot.done {
  border-color: var(--green);
  background: var(--green);
  box-shadow: 0 0 8px var(--green-glow);
}
.stage-dot.error {
  border-color: var(--red);
  background: var(--red);
}
.stage-line {
  width: 2px;
  flex: 1;
  min-height: 20px;
  background: var(--panel-border);
  transition: var(--transition);
}
.stage-line.done { background: linear-gradient(to bottom, var(--green), var(--panel-border)); }
.stage-line.active { background: linear-gradient(to bottom, var(--cyan), var(--panel-border)); }

.stage-card {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 12px;
  min-width: 0;
  transition: var(--transition);
}
.stage-card.active {
  border-color: rgba(0, 240, 255, 0.2);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.05);
}
.stage-card.done { border-color: rgba(46, 213, 115, 0.15); }
.stage-card.error { border-color: rgba(255, 71, 87, 0.15); }

.stage-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.stage-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}
.stage-badge.analyze { background: rgba(0, 240, 255, 0.12); color: var(--cyan); }
.stage-badge.execute { background: var(--amber-glow); color: var(--amber); }
.stage-badge.supervise { background: rgba(46, 213, 115, 0.12); color: var(--green); }
.stage-badge.plan { background: rgba(168, 85, 247, 0.12); color: #a855f7; }
.stage-badge.summary { background: rgba(255, 255, 255, 0.06); color: var(--text-secondary); }
.stage-badge.default { background: rgba(255, 255, 255, 0.06); color: var(--text-secondary); }

.stage-step {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}
.stage-content {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-secondary);
  word-break: break-word;
  max-height: 300px;
  overflow-y: auto;
}
.stage-content p { margin: 4px 0; }

/* ═══════════════════════════════════════════
   INPUT AREA
   ═══════════════════════════════════════════ */
.input-area {
  padding: 16px 24px;
  background: var(--abyss);
  border-top: 1px solid var(--panel-border);
  display: flex;
  gap: 12px;
  align-items: flex-end;
  flex-shrink: 0;
}
.input-wrapper {
  flex: 1;
  position: relative;
}
.input-wrapper textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  padding: 12px 16px;
  resize: none;
  outline: none;
  transition: var(--transition);
  line-height: 1.5;
  min-height: 46px;
  max-height: 150px;
}
.input-wrapper textarea:focus {
  border-color: var(--cyan-dim);
  box-shadow: 0 0 0 2px var(--cyan-glow);
}
.input-wrapper textarea::placeholder {
  color: var(--text-muted);
}

.send-btn {
  width: 46px;
  height: 46px;
  border-radius: var(--radius);
  border: 1px solid var(--cyan-dim);
  background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(0, 240, 255, 0.05));
  color: var(--cyan);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}
.send-btn:hover:not(:disabled) {
  background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(0, 240, 255, 0.1));
  box-shadow: 0 0 20px var(--cyan-glow);
}
.send-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.send-btn svg { width: 20px; height: 20px; }

/* ═══════════════════════════════════════════
   RAG PANEL
   ═══════════════════════════════════════════ */
.rag-layout {
  flex: 1;
  display: flex;
  min-height: 0;
}
.rag-sidebar {
  width: 280px;
  background: var(--panel);
  border-right: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.rag-sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--panel-border);
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.rag-tags-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.rag-tag-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 2px;
}
.rag-tag-item:hover { background: var(--panel-hover); }
.rag-tag-item.active { background: var(--cyan-glow); border: 1px solid rgba(0, 240, 255, 0.15); }
.rag-tag-name {
  flex: 1;
  font-size: 13px;
  color: var(--text-primary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.rag-tag-icon {
  color: var(--cyan-dim);
  font-size: 16px;
}
.rag-tag-delete {
  color: var(--text-muted);
  cursor: pointer;
  opacity: 0;
  transition: var(--transition);
  font-size: 14px;
  padding: 2px;
}
.rag-tag-item:hover .rag-tag-delete { opacity: 1; }
.rag-tag-delete:hover { color: var(--red); }

.rag-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Upload area */
.upload-zone {
  margin: 16px 24px;
  border: 2px dashed var(--panel-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: var(--transition);
}
.upload-zone.dragover {
  border-color: var(--cyan-dim);
  background: var(--cyan-glow);
}
.upload-drop-area {
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
}
.upload-drop-area:hover {
  background: rgba(0, 240, 255, 0.04);
}
.upload-icon {
  font-size: 32px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.upload-text {
  font-size: 13px;
  color: var(--text-secondary);
}
.upload-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}
.upload-tag-row {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
  margin-top: 12px;
}
.upload-tag-row input {
  width: 160px;
  text-align: center;
}

/* Buttons */
.btn {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--panel-border);
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.btn:hover { background: var(--panel-hover); color: var(--text-primary); }
.btn-primary {
  border-color: var(--cyan-dim);
  background: linear-gradient(135deg, rgba(0, 240, 255, 0.12), rgba(0, 240, 255, 0.06));
  color: var(--cyan);
}
.btn-primary:hover {
  background: linear-gradient(135deg, rgba(0, 240, 255, 0.22), rgba(0, 240, 255, 0.12));
  box-shadow: 0 0 16px var(--cyan-glow);
}
.btn-danger {
  border-color: rgba(255, 71, 87, 0.3);
  color: var(--red);
}
.btn-danger:hover { background: var(--red-glow); }

.btn-icon {
  width: 32px;
  height: 32px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  font-size: 14px;
}

/* ═══════════════════════════════════════════
   LOADING INDICATOR
   ═══════════════════════════════════════════ */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 8px 0;
}
.typing-indicator span {
  width: 6px;
  height: 6px;
  background: var(--cyan-dim);
  border-radius: 50%;
  animation: typing 1.4s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ═══════════════════════════════════════════
   EMPTY STATE
   ═══════════════════════════════════════════ */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-muted);
}
.empty-state-icon {
  font-size: 48px;
  opacity: 0.3;
}
.empty-state-text {
  font-size: 14px;
}
.empty-state-hint {
  font-size: 12px;
  font-family: var(--font-mono);
  opacity: 0.5;
}

/* ═══════════════════════════════════════════
   TOAST NOTIFICATION
   ═══════════════════════════════════════════ */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--surface);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  padding: 12px 20px;
  font-size: 13px;
  color: var(--text-primary);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  animation: toast-in 0.3s ease-out;
  max-width: 360px;
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
.toast.info { border-left: 3px solid var(--cyan); }
@keyframes toast-in {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ═══════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════ */
@media (max-width: 768px) {
  .sidebar { width: 56px; }
  .nav-btn { width: 40px; height: 40px; }
  .logo { display: none; }
  .rag-sidebar { width: 200px; }
  .config-bar { padding: 10px 16px; }
  .messages, .agent-timeline { padding: 16px; }
  .input-area { padding: 12px 16px; }
  .msg { max-width: 90%; }
}
</style>
</head>
<body>

<div id="app">
  <!-- ═══ SIDEBAR ═══ -->
  <nav class="sidebar">
    <div class="logo">ZAgent</div>

    <button class="nav-btn active" data-panel="chat" title="对话">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </button>

    <button class="nav-btn" data-panel="agent" title="智能体">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"></path>
      </svg>
    </button>

    <button class="nav-btn" data-panel="rag" title="知识库">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
      </svg>
    </button>

    <div class="sidebar-bottom">
      <div class="status-dot"></div>
      <span class="status-label">在线</span>
    </div>
  </nav>

  <!-- ═══ MAIN ═══ -->
  <div class="main">
    <!-- Header -->
    <header class="header">
      <span class="header-title" id="headerTitle">对话</span>
      <span class="header-subtitle" id="headerSubtitle">Chat Mode</span>
      <div class="header-right">
        <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">API: localhost:8091</span>
      </div>
    </header>

    <!-- ═══ CHAT PANEL ═══ -->
    <div class="panel active" id="panelChat">
      <div class="config-bar">
        <div class="config-group">
          <span class="config-label">Client ID</span>
          <input type="text" id="chatClientId" placeholder="输入 Client ID" value="3001" style="width: 200px;">
        </div>
        <div class="config-group">
          <span class="config-label">流式</span>
          <div class="toggle on" id="chatStreamToggle" onclick="toggleSwitch(this)">
            <div class="toggle-track"><div class="toggle-knob"></div></div>
          </div>
        </div>
      </div>
      <div class="messages" id="chatMessages">
        <div class="empty-state">
          <div class="empty-state-icon">⚡</div>
          <div class="empty-state-text">开始一段新对话</div>
          <div class="empty-state-hint">输入 Client ID，发送消息即可开始</div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="chatInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
        </div>
        <button class="send-btn" id="chatSendBtn" onclick="sendChat()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <!-- ═══ AGENT PANEL ═══ -->
    <div class="panel" id="panelAgent">
      <div class="config-bar">
        <div class="config-group">
          <span class="config-label">Agent ID</span>
          <input type="text" id="agentId" placeholder="输入 Agent ID" value="2" style="width: 200px;">

        <div class="config-group">
          <span class="config-label">最大步数</span>

        <div class="config-group">
          <span class="config-label">流式</span>

        <div class="input-wrapper">
          <textarea id="agentInput" placeholder="输入任务指令... (Enter 发送)" rows="1"></textarea>
        </div>
        <button class="send-btn" id="agentSendBtn" onclick="sendAgent()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>

        </button>

    </div>

    <!-- ═══ RAG PANEL ═══ -->
    <div class="panel" id="panelRag">
      <div class="rag-layout">
        <div class="rag-sidebar">

            <span>知识标签</span>
            <button class="btn-icon btn" onclick="loadRagTags()" title="刷新">↻</button>
          </div>
          <div class="rag-tags-list" id="ragTagsList">
            <div class="empty-state" style="padding: 32px 16px;">
              <div class="empty-state-text" style="font-size: 12px;">暂无标签</div>
              <div class="empty-state-hint">上传文档后自动创建</div>
            </div>
          </div>
        </div>
        <div class="rag-main">
          <!-- Upload zone -->
          <div class="upload-zone" id="uploadZone">
            <div class="upload-drop-area" onclick="document.getElementById('ragFileInput').click()">
              <input type="file" id="ragFileInput" onchange="handleFileSelect(event)" style="display:none;">
              <div class="upload-icon">📄</div>
              <div class="upload-text">拖拽文件到此处或点击上传</div>
              <div class="upload-hint">支持 PDF、TXT、MD 等文本文件</div>
              <div class="upload-filename" id="uploadFileName" style="margin-top:8px;color:var(--cyan);font-size:13px;display:none;"></div>
            </div>
            <div class="upload-tag-row">
              <span class="config-label">知识标签</span>
              <input type="text" id="ragUploadTag" placeholder="输入标签名">
              <button class="btn btn-primary" id="uploadBtn" onclick="uploadRagFile()">上传</button>
            </div>
          </div>
          <!-- RAG Chat Config -->
          <div class="config-bar" style="border-top: 1px solid var(--panel-border); border-bottom: none;">
            <div class="config-group">
              <span class="config-label">Client ID</span>
              <input type="text" id="ragClientId" placeholder="输入 Client ID" style="width: 180px;" value="3001">
            </div>
            <div class="config-group">
              <span class="config-label">知识标签</span>
              <input type="text" id="ragQueryTag" placeholder="选择或输入标签" style="width: 160px;">
            </div>
          </div>
          <!-- RAG messages -->
          <div class="messages" id="ragMessages" style="flex: 1;">
            <div class="empty-state">
              <div class="empty-state-icon">📚</div>
              <div class="empty-state-text">知识库问答</div>
              <div class="empty-state-hint">上传文档后，基于知识进行对话</div>
            </div>
          </div>
          <div class="input-area">
            <div class="input-wrapper">
              <textarea id="ragInput" placeholder="基于知识库提问... (Enter 发送)" rows="1"></textarea>
            </div>
            <button class="send-btn" id="ragSendBtn" onclick="sendRag()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<div class="toast-container" id="toastContainer"></div>

<script>
/* ═══════════════════════════════════════════
   CONFIGURATION
   ═══════════════════════════════════════════ */
const API_BASE = 'http://localhost:8091';

/* ═══════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════ */
const panels = { chat: '对话', agent: '智能体', rag: '知识库' };
const subtitles = { chat: 'Chat Mode', agent: 'Agent Orchestration', rag: 'RAG Knowledge Base' };

document.querySelectorAll('.nav-btn[data-panel]').forEach(btn => {
  btn.addEventListener('click', () => {
    const panel = btn.dataset.panel;
    // Update nav buttons
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Update panels
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel' + panel.charAt(0).toUpperCase() + panel.slice(1)).classList.add('active');
    // Update header
    document.getElementById('headerTitle').textContent = panels[panel];
    document.getElementById('headerSubtitle').textContent = subtitles[panel];
    // Load tags when switching to RAG
    if (panel === 'rag') loadRagTags();
  });
});

/* ═══════════════════════════════════════════
   TOGGLE SWITCH
   ═══════════════════════════════════════════ */
function toggleSwitch(el) {
  el.classList.toggle('on');
}
function isStreamOn(toggleId) {
  return document.getElementById(toggleId).classList.contains('on');
}

/* ═══════════════════════════════════════════
   TOAST NOTIFICATION
   ═══════════════════════════════════════════ */
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(20px)';
    toast.style.transition = '0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

/* ═══════════════════════════════════════════
   TEXT AREA AUTO-RESIZE + ENTER HANDLING
   ═══════════════════════════════════════════ */
document.querySelectorAll('textarea').forEach(ta => {
  ta.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 150) + 'px';
  });
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      // Find the send button in the same input-area
      const sendBtn = this.closest('.input-area').querySelector('.send-btn');
      if (sendBtn && !sendBtn.disabled) sendBtn.click();
    }
  });
});

/* ═══════════════════════════════════════════
   MARKDOWN RENDERING
   ═══════════════════════════════════════════ */
function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    try {
      marked.setOptions({ breaks: true, gfm: true });
      return marked.parse(text);
    } catch(e) { /* fall through */ }
  }
  return text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

/* ═══════════════════════════════════════════
   MESSAGE HELPERS
   ═══════════════════════════════════════════ */
function clearEmpty(container) {
  const empty = container.querySelector('.empty-state');
  if (empty) empty.remove();
}

function addMessage(container, role, content) {
  clearEmpty(container);
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const sender = role === 'user' ? '你' : 'ZAgent';
  msg.innerHTML = `
    <div class="msg-sender">${sender}</div>
    <div class="msg-bubble">${role === 'user' ? escapeHtml(content) : renderMarkdown(content)}</div>
  `;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
  return msg;
}

function createStreamMessage(container) {
  clearEmpty(container);
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.innerHTML = `
    <div class="msg-sender">ZAgent</div>
    <div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
  `;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
  return msg.querySelector('.msg-bubble');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

/* ═══════════════════════════════════════════
   CHAT
   ═══════════════════════════════════════════ */
let chatLoading = false;

async function sendChat() {
  if (chatLoading) return;
  const clientId = document.getElementById('chatClientId').value.trim();
  const message = document.getElementById('chatInput').value.trim();
  if (!clientId) return showToast('请输入 Client ID', 'error');
  if (!message) return;

  const container = document.getElementById('chatMessages');
  addMessage(container, 'user', message);
  document.getElementById('chatInput').value = '';
  document.getElementById('chatInput').style.height = 'auto';

  chatLoading = true;
  document.getElementById('chatSendBtn').disabled = true;

  try {
    if (isStreamOn('chatStreamToggle')) {
      const bubble = createStreamMessage(container);
      let fullText = '';
      let finished = false;
      const url = `${API_BASE}/api/chat/stream?clientId=${encodeURIComponent(clientId)}&message=${encodeURIComponent(message)}`;
      const eventSource = new EventSource(url);

      const cleanup = () => {
        if (finished) return;
        finished = true;
        eventSource.close();
        if (!fullText) bubble.innerHTML = '<span style="color: var(--red);">连接失败，请检查后端是否启动以及 Client ID 是否正确</span>';
        chatLoading = false;
        document.getElementById('chatSendBtn').disabled = false;
      };

      eventSource.onmessage = (e) => {
        fullText += e.data;
        bubble.innerHTML = renderMarkdown(fullText);
        container.scrollTop = container.scrollHeight;
      };
      // SSE 正常结束时浏览器也会触发 onerror，需要判断是否已收到数据
      eventSource.onerror = () => cleanup();
    } else {
      const bubble = createStreamMessage(container);
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clientId, message })
      });
      const json = await res.json();
      const content = (json.data && json.data.content) ? json.data.content : JSON.stringify(json);
      bubble.innerHTML = renderMarkdown(content);
      container.scrollTop = container.scrollHeight;
    }
  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
  } finally {
    chatLoading = false;
    document.getElementById('chatSendBtn').disabled = false;
  }
}

/* ═══════════════════════════════════════════
   AGENT
   ═══════════════════════════════════════════ */
let agentLoading = false;

function getStageBadgeClass(stage) {
  const s = (stage || '').toLowerCase();
  if (s.includes('analy') || s.includes('分析')) return 'analyze';
  if (s.includes('execut') || s.includes('执行')) return 'execute';
  if (s.includes('supervi') || s.includes('监督') || s.includes('质量')) return 'supervise';
  if (s.includes('plan') || s.includes('规划')) return 'plan';
  if (s.includes('summar') || s.includes('总结') || s.includes('complete')) return 'summary';
  return 'default';
}

function addStageNode(container, event, isActive) {
  clearEmpty(container);
  const node = document.createElement('div');
  node.className = 'stage-node';
  const dotClass = isActive ? 'active' : 'done';
  const lineClass = isActive ? 'active' : 'done';
  const cardClass = isActive ? 'active' : 'done';
  const badgeClass = getStageBadgeClass(event.stage);
  const contentHtml = event.content ? renderMarkdown(event.content) : '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  node.innerHTML = `
    <div class="stage-rail">
      <div class="stage-dot ${dotClass}"></div>
      <div class="stage-line ${lineClass}"></div>
    </div>
    <div class="stage-card ${cardClass}">
      <div class="stage-header">
        <span class="stage-badge ${badgeClass}">${escapeHtml(event.stage || '执行中')}</span>
        ${event.step ? `<span class="stage-step">步骤 ${event.step}</span>` : ''}
      </div>
      <div class="stage-content">${contentHtml}</div>
    </div>
  `;
  container.appendChild(node);
  container.scrollTop = container.scrollHeight;
  return node;
}

function finalizeLastNode(container) {
  const nodes = container.querySelectorAll('.stage-node');
  if (nodes.length === 0) return;
  const last = nodes[nodes.length - 1];
  last.querySelector('.stage-dot').classList.remove('active');
  last.querySelector('.stage-dot').classList.add('done');
  last.querySelector('.stage-card').classList.remove('active');
  last.querySelector('.stage-card').classList.add('done');
  const line = last.querySelector('.stage-line');
  if (line) { line.classList.remove('active'); line.classList.add('done'); }
}

async function sendAgent() {
  if (agentLoading) return;
  const agentIdVal = document.getElementById('agentId').value.trim();
  const userInput = document.getElementById('agentInput').value.trim();
  const maxStep = parseInt(document.getElementById('agentMaxStep').value) || 10;
  if (!agentIdVal) return showToast('请输入 Agent ID', 'error');
  if (!userInput) return;

  const container = document.getElementById('agentTimeline');
  // Clear previous run
  container.innerHTML = '';

  // Show user input as a stage
  addStageNode(container, { stage: '用户指令', content: userInput }, false);

  document.getElementById('agentInput').value = '';
  document.getElementById('agentInput').style.height = 'auto';
  agentLoading = true;
  document.getElementById('agentSendBtn').disabled = true;

  try {
    if (isStreamOn('agentStreamToggle')) {
      const url = `${API_BASE}/api/agent/run/stream?agentId=${encodeURIComponent(agentIdVal)}&input=${encodeURIComponent(userInput)}&maxStep=${maxStep}`;
      const eventSource = new EventSource(url);
      let currentNode = null;
      let currentContent = '';
      let finished = false;

      const cleanup = () => {
        if (finished) return;
        finished = true;
        eventSource.close();
        if (currentNode) finalizeLastNode(container);
        else addStageNode(container, { stage: '错误', content: '连接失败，请检查后端是否启动以及 Agent ID 是否正确' }, false);
        agentLoading = false;
        document.getElementById('agentSendBtn').disabled = false;
      };

      eventSource.onmessage = (e) => {
        try {
          const event = JSON.parse(e.data);
          if (currentNode) finalizeLastNode(container);
          currentContent = event.content || '';
          currentNode = addStageNode(container, event, true);
        } catch (err) {
          if (currentNode) {
            currentContent += e.data;
            const contentEl = currentNode.querySelector('.stage-content');
            if (contentEl) contentEl.innerHTML = renderMarkdown(currentContent);
            container.scrollTop = container.scrollHeight;
          }
        }
      };

      eventSource.onerror = () => cleanup();
    } else {
      const loadingNode = addStageNode(container, { stage: '执行中', content: '' }, true);
      const res = await fetch(`${API_BASE}/api/agent/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agentId: agentIdVal, input: userInput, maxStep })
      });
      const json = await res.json();
      const resultData = json.data || {};
      const content = resultData.result || resultData.content || JSON.stringify(resultData);
      finalizeLastNode(container);
      addStageNode(container, { stage: '完成', content }, false);
    }
  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
    addStageNode(container, { stage: '错误', content: e.message }, false);
    const lastDot = container.querySelector('.stage-node:last-child .stage-dot');
    if (lastDot) { lastDot.classList.remove('done'); lastDot.classList.add('error'); }
  } finally {
    agentLoading = false;
    document.getElementById('agentSendBtn').disabled = false;
  }
}

/* ═══════════════════════════════════════════
   RAG
   ═══════════════════════════════════════════ */
let ragLoading = false;
let selectedRagTag = '';

// Drag & drop
const uploadZone = document.getElementById('uploadZone');
const dropArea = uploadZone.querySelector('.upload-drop-area');
dropArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
dropArea.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
dropArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    document.getElementById('ragFileInput').files = files;
    showSelectedFile(files[0].name);
  }
});

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file) showSelectedFile(file.name);
}

function showSelectedFile(name) {
  const el = document.getElementById('uploadFileName');
  el.textContent = '已选择: ' + name;
  el.style.display = 'block';
  showToast(`已选择: ${name}`, 'info');
}

async function uploadRagFile() {
  const fileInput = document.getElementById('ragFileInput');
  const tag = document.getElementById('ragUploadTag').value.trim();
  if (!fileInput.files.length) return showToast('请选择文件', 'error');
  if (!tag) return showToast('请输入知识标签', 'error');

  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  formData.append('knowledgeTag', tag);

  document.getElementById('uploadBtn').textContent = '上传中...';
  document.getElementById('uploadBtn').disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/rag/upload`, {
      method: 'POST',
      body: formData
    });
    if (res.ok) {
      showToast('上传成功', 'success');
      fileInput.value = '';
      document.getElementById('ragUploadTag').value = '';
      document.getElementById('uploadFileName').style.display = 'none';
      loadRagTags();
    } else {
      const errText = await res.text();
      showToast('上传失败: ' + errText, 'error');
    }
  } catch (e) {
    showToast('上传失败: ' + e.message, 'error');
  } finally {
    document.getElementById('uploadBtn').textContent = '上传';
    document.getElementById('uploadBtn').disabled = false;
  }
}

async function loadRagTags() {
  try {
    const res = await fetch(`${API_BASE}/api/rag/tags`);
    const json = await res.json();
    const tagsData = json.data || json || [];
    const list = document.getElementById('ragTagsList');
    if (!tagsData || tagsData.length === 0) {
      list.innerHTML = `<div class="empty-state" style="padding: 32px 16px;">
        <div class="empty-state-text" style="font-size: 12px;">暂无标签</div>
        <div class="empty-state-hint">上传文档后自动创建</div>
      </div>`;
      return;
    }
    list.innerHTML = tagsData.map(item => {
      const tag = item.knowledge || item.tag || item;
      const count = item.doc_count || item.count || '';
      return `
      <div class="rag-tag-item ${selectedRagTag === tag ? 'active' : ''}" onclick="selectRagTag('${escapeHtml(String(tag))}')">
        <span class="rag-tag-icon">🏷</span>
        <span class="rag-tag-name">${escapeHtml(String(tag))}</span>
        ${count ? `<span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">${count}</span>` : ''}
        <span class="rag-tag-delete" onclick="event.stopPropagation(); deleteRagTag('${escapeHtml(String(tag))}')" title="删除">✕</span>
      </div>`;
    }).join('');
  } catch (e) {
    showToast('加载标签失败', 'error');
  }
}

function selectRagTag(tag) {
  selectedRagTag = tag;
  document.getElementById('ragQueryTag').value = tag;
  document.querySelectorAll('.rag-tag-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.rag-tag-name').textContent === tag);
  });
}

async function deleteRagTag(tag) {
  if (!confirm(`确定删除知识标签「${tag}」及其所有文档吗？`)) return;
  try {
    const res = await fetch(`${API_BASE}/api/rag/${encodeURIComponent(tag)}`, { method: 'DELETE' });
    if (res.ok) {
      showToast(`已删除标签: ${tag}`, 'success');
      if (selectedRagTag === tag) {
        selectedRagTag = '';
        document.getElementById('ragQueryTag').value = '';
      }
      loadRagTags();
    } else {
      showToast('删除失败', 'error');
    }
  } catch (e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

async function sendRag() {
  if (ragLoading) return;
  const clientId = document.getElementById('ragClientId').value.trim();
  const knowledgeTag = document.getElementById('ragQueryTag').value.trim();
  const message = document.getElementById('ragInput').value.trim();
  if (!clientId) return showToast('请输入 Client ID', 'error');
  if (!knowledgeTag) return showToast('请输入或选择知识标签', 'error');
  if (!message) return;

  const container = document.getElementById('ragMessages');
  addMessage(container, 'user', message);
  document.getElementById('ragInput').value = '';
  document.getElementById('ragInput').style.height = 'auto';

  ragLoading = true;
  document.getElementById('ragSendBtn').disabled = true;

  try {
    const bubble = createStreamMessage(container);
    const params = new URLSearchParams({ clientId, question: message, knowledgeTag });
    const res = await fetch(`${API_BASE}/api/rag/query?${params.toString()}`, {
      method: 'POST'
    });
    const json = await res.json();
    const content = json.data || JSON.stringify(json);
    bubble.innerHTML = renderMarkdown(content);
    container.scrollTop = container.scrollHeight;
  } catch (e) {
    showToast('查询失败: ' + e.message, 'error');
  } finally {
    ragLoading = false;
    document.getElementById('ragSendBtn').disabled = false;
  }
}
